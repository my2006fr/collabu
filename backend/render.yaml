# render.yaml — Infrastructure-as-code for Render.com
# Place this file in your repository root or backend folder.
# Render will auto-detect it when you connect your repo.

services:
  - type: web
    name: collabu-backend
    env: python
    region: singapore
    plan: free
    pythonVersion: "3.11.0"
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class geventwebsocket.gunicorn.workers.GeventWebSocketWorker -w 1 --bind 0.0.0.0:$PORT --timeout 120 "app:app"
    healthCheckPath: /health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: collabu-db
          property: connectionString
      - key: ALLOWED_DOMAIN
        value: myiuc.com
      - key: FRONTEND_URL
        sync: false
      - key: FLASK_ENV
        value: production
      - key: JWT_EXPIRES_DAYS
        value: "7"
      - key: MAX_UPLOAD_MB
        value: "50"