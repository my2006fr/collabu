# render.yaml — Infrastructure-as-code for Render.com
# Place this file in the root of your GitHub repo (not inside backend/).
# Render will auto-detect it when you connect your repo.

services:
  - type: web
    name: collabu-backend
    env: python
    region: singapore
    plan: free
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class eventlet -w 1 --bind 0.0.0.0:$PORT --timeout 120 "app:app"
    healthCheckPath: /health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        sync: false          # Set manually in Render dashboard
      - key: DATABASE_URL
        fromDatabase:
          name: collabu-db
          property: connectionString
      - key: ALLOWED_DOMAIN
        value: myiuc.com
      - key: FRONTEND_URL
        sync: false          # Set to your Vercel URL after deploying frontend
      - key: FLASK_ENV
        value: production
      - key: JWT_EXPIRES_DAYS
        value: "7"
      - key: MAX_UPLOAD_MB
        value: "50"
      - key: PYTHON_VERSION
        value: "3.11.0"

databases:
  - name: collabu-db
    databaseName: collabu
    user: collabu_user
    plan: free
