# render.yaml — Infrastructure-as-code for Render.com
# Place this file in your repository root or backend folder.
# Render will auto-detect it when you connect your repo.

services:
  - type: web
    name: collabu-backend
    env: python
    region: oregon          # change to your preferred region
    plan: free              # upgrade to starter ($7/mo) for persistent disk
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class eventlet -w 1 --bind 0.0.0.0:$PORT --timeout 120 "app:app"
    healthCheckPath: /health
    envVars:
      - key: SECRET_KEY
        generateValue: true          # Render auto-generates a secure random value
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        sync: false                  # you must set this manually (see setup guide)
      - key: DATABASE_URL
        fromDatabase:
          name: collabu-db
          property: connectionString
      - key: ALLOWED_DOMAIN
        value: university.edu        # change to your university domain
      - key: FRONTEND_URL
        sync: false                  # set to your Vercel URL after deploying frontend
      - key: FLASK_ENV
        value: production
      - key: JWT_EXPIRES_DAYS
        value: "7"
      - key: MAX_UPLOAD_MB
        value: "50"

databases:
  - name: collabu-db
    databaseName: collabu
    user: collabu_user
    plan: free
